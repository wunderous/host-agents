name: Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        id: release_version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            version="dev-${GITHUB_SHA::12}"
          fi
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            package_version=$(node -p "require('./npm/local-host-agent/package.json').version")
            test "$package_version" = "$version"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          make artifacts VERSION="$version"

      - name: Generate release checksums
        run: sha256sum dist/host-agent-linux-x64.gz dist/host-agent-linux-arm64.gz > dist/SHA256SUMS

      - name: Prepare x64 standalone smoke binary
        run: gzip -dc dist/host-agent-linux-x64.gz > dist/host-agent-linux-x64

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - name: Standalone Streamable HTTP smoke
        run: OPUTE_STANDALONE_BINARY=dist/host-agent-linux-x64 go test ./test/standalone -count=1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: host-agent-binaries
          if-no-files-found: error
          path: |
            dist/host-agent-linux-x64.gz
            dist/host-agent-linux-arm64.gz
            dist/SHA256SUMS
            dist/sbom.spdx.json

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: host-agent-binaries
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/host-agent-linux-x64.gz
            dist/host-agent-linux-arm64.gz
            dist/SHA256SUMS
            dist/sbom.spdx.json
          generate_release_notes: true

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

  npm:
    if: startsWith(github.ref, 'refs/tags/v') && needs.release.result == 'success'
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Test and publish npm launcher
        working-directory: npm/local-host-agent
        run: |
          npm test
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
