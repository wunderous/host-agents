name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        run: make artifacts

      - name: Verify artifact outputs
        run: |
          test -f dist/host-agent-linux-x64.gz
          test -f dist/host-agent-linux-arm64.gz
          gzip -t dist/host-agent-linux-x64.gz
          gzip -t dist/host-agent-linux-arm64.gz
